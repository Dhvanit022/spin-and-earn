<!DOCTYPE html>
<html>
<head>
  <title>Spin & Earn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f6f9;
      padding: 30px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 10px;
    }

    .coins {
      font-size: 22px;
      margin: 10px 0;
      color: green;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background: grey;
      cursor: not-allowed;
    }

    #timer {
      margin-top: 15px;
      font-weight: bold;
      color: red;
    }

    .info {
      margin-top: 15px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Spin & Earn</h1>

  <div class="coins">
    Coins: <span id="coins">0</span>
  </div>

  <div>
    Spins Today: <span id="spinCount">0</span>/30
  </div>

  <br>

  <button onclick="spin()" id="spinBtn">Spin Now</button>

  <div id="timer"></div>

  <div class="info">
    1000 Coins = ₹5 <br>
    Minimum Withdrawal = 2000 Coins (₹10)
  </div>
</div>

<script>

const MAX_SPINS = 30;
const SPIN_REWARD = 20;

let coins = localStorage.getItem("coins") 
  ? parseInt(localStorage.getItem("coins")) 
  : 0;

let spinCount = localStorage.getItem("spinCount") 
  ? parseInt(localStorage.getItem("spinCount")) 
  : 0;

let lastSpinDate = localStorage.getItem("lastSpinDate") || "";

let today = new Date().toDateString();

if (lastSpinDate !== today) {
  spinCount = 0;
  localStorage.setItem("spinCount", 0);
  localStorage.setItem("lastSpinDate", today);
}

document.getElementById("coins").innerText = coins;
document.getElementById("spinCount").innerText = spinCount;

function spin() {

  if (spinCount >= MAX_SPINS) {
    document.getElementById("timer").innerText = "Daily spin limit reached!";
    return;
  }

window.open("https://example.pro/?123456", "_blank");
  document.getElementById("spinBtn").disabled = true;

  let timeLeft = 30;
  document.getElementById("timer").innerText = "Wait " + timeLeft + " seconds...";

  let countdown = setInterval(function() {

    timeLeft--;
    document.getElementById("timer").innerText = "Wait " + timeLeft + " seconds...";

    if (timeLeft <= 0) {

      clearInterval(countdown);

      coins += SPIN_REWARD;
      spinCount++;

      localStorage.setItem("coins", coins);
      localStorage.setItem("spinCount", spinCount);

      document.getElementById("coins").innerText = coins;
      document.getElementById("spinCount").innerText = spinCount;

      document.getElementById("timer").innerText = "You earned 20 coins!";

      document.getElementById("spinBtn").disabled = false;
    }

  }, 1000);
}

</script>

</body>
</html>
