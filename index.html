<!DOCTYPE html>
<html>
<head>
  <title>Spin & Earn</title>
</head>
<body style="text-align:center; font-family:Arial;">

  <h1>Spin & Earn</h1>
  <h2>Coins: <span id="coins">0</span></h2>

  <button onclick="spin()" id="spinBtn" style="padding:15px 30px; font-size:18px;">
    Spin Now
  </button>

  <p id="timer"></p>

<script>
let coins = 0;
let canSpin = true;

function spin() {
  if (!canSpin) return;

  // OPEN ADSTERRA DIRECT LINK
  window.open("https://example.pro/?123456", "_blank");

  canSpin = false;
  document.getElementById("spinBtn").disabled = true;

  let timeLeft = 30;
  document.getElementById("timer").innerText = "Wait " + timeLeft + " seconds...";

  let countdown = setInterval(function() {
    timeLeft--;
    document.getElementById("timer").innerText = "Wait " + timeLeft + " seconds...";

    if (timeLeft <= 0) {
      clearInterval(countdown);
      coins += 20;
      document.getElementById("coins").innerText = coins;
      document.getElementById("timer").innerText = "You earned 20 coins!";
      canSpin = true;
      document.getElementById("spinBtn").disabled = false;
    }
  }, 1000);
}
</script>

</body>
</html>
