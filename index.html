<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spin & Earn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 30px;
      text-align: center;
    }

    .card {
      background: #fff;
      padding: 25px;
      max-width: 420px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 { margin-bottom: 10px; }

    .coins {
      font-size: 22px;
      color: green;
      margin: 10px 0;
    }

    button {
      padding: 14px 30px;
      font-size: 18px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    #timer {
      margin-top: 15px;
      color: red;
      font-weight: bold;
    }

    .info {
      margin-top: 15px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Spin & Earn</h1>

  <div class="coins">
    Coins: <span id="coins">0</span>
  </div>

  <div>
    Spins Today: <span id="spinCount">0</span>/30
  </div>

  <br>

  <button id="spinBtn">Spin Now</button>

  <div id="timer"></div>

  <div class="info">
    1000 Coins = ₹5 <br>
    Minimum Withdrawal = 2000 Coins (₹10)
  </div>
</div>

<script>
/* ================= CONFIG ================= */
const MAX_SPINS = 30;
const SPIN_REWARD = 20;
const COOLDOWN_SECONDS = 30;
const ADSTERRA_LINK = "YOUR_ADSTERRA_DIRECT_LINK_HERE";
/* ========================================= */

/* ====== BASIC STATE LOCKS ====== */
let isSpinning = false;

/* ====== LOAD SAVED DATA ====== */
let coins = Number(localStorage.getItem("coins")) || 0;
let spinCount = Number(localStorage.getItem("spinCount")) || 0;
let lastSpinDate = localStorage.getItem("lastSpinDate") || "";

const today = new Date().toDateString();

/* ====== DAILY RESET ====== */
if (lastSpinDate !== today) {
  spinCount = 0;
  localStorage.setItem("spinCount", "0");
  localStorage.setItem("lastSpinDate", today);
}

/* ====== UI UPDATE ====== */
document.getElementById("coins").innerText = coins;
document.getElementById("spinCount").innerText = spinCount;

document.getElementById("spinBtn").addEventListener("click", spin);

/* ====== SPIN FUNCTION ====== */
function spin() {

  if (isSpinning) return;

  if (spinCount >= MAX_SPINS) {
    document.getElementById("timer").innerText =
      "Daily spin limit reached!";
    return;
  }

  isSpinning = true;
  document.getElementById("spinBtn").disabled = true;

  /* OPEN AD (USER ACTION REQUIRED) */
  window.open(ADSTERRA_LINK, "_blank");

  let timeLeft = COOLDOWN_SECONDS;
  document.getElementById("timer").innerText =
    `Wait ${timeLeft} seconds...`;

  const countdown = setInterval(() => {
    timeLeft--;

    document.getElementById("timer").innerText =
      `Wait ${timeLeft} seconds...`;

    if (timeLeft <= 0) {
      clearInterval(countdown);

      /* UPDATE VALUES */
      coins += SPIN_REWARD;
      spinCount++;

      /* SAVE (TEMP – FRONTEND ONLY) */
      localStorage.setItem("coins", coins.toString());
      localStorage.setItem("spinCount", spinCount.toString());

      /* UPDATE UI */
      document.getElementById("coins").innerText = coins;
      document.getElementById("spinCount").innerText = spinCount;
      document.getElementById("timer").innerText =
        `You earned ${SPIN_REWARD} coins!`;

      document.getElementById("spinBtn").disabled = false;
      isSpinning = false;
    }
  }, 1000);
}
</script>

</body>
</html>
